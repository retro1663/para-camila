<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Camila ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>

        body{
        margin:0;
        font-family:'Poppins',sans-serif;
        background:radial-gradient(circle at top,#1a1830,#0d0c18,#000);
        color:#f5f1e8;
        text-align:center;
        overflow-x:hidden;
        }

        /* TITULO */

        .titulo{
        font-family:'Playfair Display',serif;
        font-size:55px;
        margin-top:40px;
        }

        /* CARTA */

        .carta{
        background:#2b2431;
        padding:35px;
        border-radius:20px;
        width:420px;
        max-width:90%;
        margin:auto;
        margin-top:30px;
        box-shadow:0 10px 25px rgba(0,0,0,0.25);
        }

        /* BOTONES */

        button{
        padding:14px 28px;
        border:none;
        border-radius:30px;
        background:#f5f1e8;
        color:#1f1b24;
        font-size:17px;
        cursor:pointer;
        transition:.3s;
        margin:10px;
        }

        button:hover{
        transform:scale(1.08);
        }

        /* INTRO */

        #intro{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        display:flex;
        justify-content:center;
        align-items:center;
        background:radial-gradient(circle at top,#1a1830,#0d0c18,#000);
        z-index:100;
        transition:1s;
        }

        .intro-contenido{
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:20px;
        max-width:400px;
        }

        /* CORAZON */

        .heart{
        width:80px;
        height:80px;
        background:#f5f1e8;
        position:relative;
        transform:rotate(-45deg);
        animation:latido 1s infinite;
        }

        .heart:before,
        .heart:after{
        content:"";
        width:80px;
        height:80px;
        background:#f5f1e8;
        border-radius:50%;
        position:absolute;
        }

        .heart:before{
        top:-40px;
        left:0;
        }

        .heart:after{
        left:40px;
        top:0;
        }

        @keyframes latido{
        0%{transform:rotate(-45deg) scale(1);}
        50%{transform:rotate(-45deg) scale(1.15);}
        100%{transform:rotate(-45deg) scale(1);}
        }

        /* GALERIA */

        .galeria{
        margin-top:30px;
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        gap:25px;
        }

        .galeria img{
        width:260px;
        height:360px;
        object-fit:cover;
        border-radius:18px;
        box-shadow:0 10px 25px rgba(0,0,0,0.4);
        opacity:0;
        transform:translateY(40px);
        transition:1s;
        }

        .galeria img.visible{
        opacity:1;
        transform:translateY(0);
        }

        /* ESTRELLAS */

        .estrella{
        position:fixed;
        width:2px;
        height:2px;
        background:white;
        border-radius:50%;
        opacity:.8;
        animation:brillo 3s infinite alternate;
        }

        @keyframes brillo{
        0%{opacity:.3}
        100%{opacity:1}
        }

        /* ESTRELLA FUGAZ */

        .fugaz{
        position:fixed;
        width:2px;
        height:120px;
        background:linear-gradient(white,transparent);
        transform:rotate(45deg);
        }

        @keyframes estrellaFugaz{
        0%{transform:translate(-200px,-200px) rotate(45deg);opacity:1;}
        100%{transform:translate(120vw,120vh) rotate(45deg);opacity:0;}
        }

        /* PARTICULAS */

        .particula{
        position:fixed;
        width:5px;
        height:5px;
        background:#f5f1e8;
        border-radius:50%;
        pointer-events:none;
        animation:subir 4s linear forwards;
        }

        @keyframes subir{
        0%{transform:translateY(0);opacity:1;}
        100%{transform:translateY(-200px);opacity:0;}
        }

        /* EXPLOSION CORAZON */

        .particula-corazon{
        position:fixed;
        width:6px;
        height:6px;
        background:#f5f1e8;
        border-radius:50%;
        pointer-events:none;
        animation:explosion 1.5s linear forwards;
        }

        @keyframes explosion{

        0%{
        transform:translate(0,0);
        opacity:1;
        }

        100%{
        transform:translate(var(--x),var(--y));
        opacity:0;
        }

        }

        /* CONTADOR */

        #contador{
        margin-top:15px;
        font-size:20px;
        }

        /* FRASE FINAL CINEMATOGRAFICA */

        #fraseFinal{
        position:fixed;
        top:45%;
        left:50%;
        transform:translate(-50%,-50%);
        font-size:42px;
        opacity:0;
        color:white;
        transition:3s;
        pointer-events:none;
        max-width:700px;
        line-height:1.4;
        text-align:center;
        }

        /* FINAL */

        #final{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        background:#000;
        opacity:0;
        pointer-events:none;
        transition:1s;
        color:white;
        }

    </style>

</head>

<body>

<audio id="musica" src="mi-flaco.mp3"></audio>

<div id="intro">

    <div class="intro-contenido">

        <h1 class="titulo">Camila ❤️</h1>

        <div class="heart"></div>

        <p style="opacity:.8">Tengo algo que decirte…</p>

        <button onclick="entrar()">Ver</button>

    </div>

</div>

<h1 class="titulo">Camila ❤️</h1>

<div class="carta">

    <p>Desde el 29 de mayo de 2023 mi vida cambió para siempre.</p>

    <button onclick="iniciarCarta()">Haz clic aquí</button>

    <p id="cartaAmor"></p>

    <p id="contador"></p>

</div>

<h2>Nuestros momentos 📸</h2>

<div class="galeria">

    <img src="img/foto1.jpg">
    <img src="img/foto2.jpg">
    <img src="img/foto3.jpg">

</div>

<div id="fraseFinal">
    Y si algún día vuelvo a empezar mi vida,<br>
    ojalá vuelva a encontrarte otra vez. ❤️
</div>

<div id="final">

    <h1 class="titulo">Te amo Camila ❤️</h1>
    <p>Gracias por caminar conmigo 💖</p>

</div>

<script>

    /* ESTRELLAS */

    for(let i=0;i<120;i++){

    let estrella=document.createElement("div");

    estrella.className="estrella";

    estrella.style.left=Math.random()*100+"vw";
    estrella.style.top=Math.random()*100+"vh";

    document.body.appendChild(estrella);

    }

    /* ESTRELLA FUGAZ */

    function estrellaFugaz(){

    let s=document.createElement("div");

    s.className="fugaz";

    document.body.appendChild(s);

    s.style.animation="estrellaFugaz 2s linear";

    setTimeout(()=>s.remove(),2000);

    }

    setInterval(estrellaFugaz,7000);

    /* INTRO CON EXPLOSION */

    function entrar(){

    let heart=document.querySelector(".heart");

    let rect=heart.getBoundingClientRect();

    for(let i=0;i<40;i++){

    let p=document.createElement("div");

    p.className="particula-corazon";

    p.style.left=rect.left+rect.width/2+"px";
    p.style.top=rect.top+rect.height/2+"px";

    p.style.setProperty("--x",(Math.random()*300-150)+"px");
    p.style.setProperty("--y",(Math.random()*300-150)+"px");

    document.body.appendChild(p);

    setTimeout(()=>p.remove(),1500);

    }

    setTimeout(()=>{

    document.getElementById("intro").style.opacity="0";

    },200);

    setTimeout(()=>{

    document.getElementById("intro").style.display="none";
    mostrarFotos();

    },1200);

    }

    /* CARTA */

    function iniciarCarta(){

    document.getElementById("musica").play();

    let texto=`Camilita, desde que llegaste a mi vida todo se volvió más bonito.
    Comenzó una historia que para mí es muy especial.
    Tal vez para muchas personas un día más en el calendario no significa mucho,
    pero para mí ese día marcó el inicio de algo que cambió completamente mi vida.

    Desde que empezamos a compartir momentos juntos, entendí que el amor no se trata
    solo de palabras, sino de pequeños detalles, de miradas, de risas y de esos
    instantes simples que terminan siendo los más importantes.

    Me gusta recordar todo lo que hemos vivido juntos.
    Cada conversación larga, cada momento en el que nos reímos por cosas simples,
    cada vez que estamos juntos, cada recuerdo que poco a poco fue construyendo
    esta historia que hoy tenemos.

    Contigo aprendí que cuando estás con la persona correcta todo se siente diferente.
    Los días normales se vuelven especiales, los problemas parecen más pequeños
    y la vida se siente un poco más ligera.

    Hay muchas cosas que admiro de ti.
    Tu forma de ser, tu manera de ver las cosas, tu sonrisa, tu forma de reír,
    y todas esas pequeñas cosas que te hacen única.

    A veces pienso en lo curioso que es el destino,
    cómo dos caminos pueden cruzarse y terminar creando algo tan bonito.

    Y si algún día vuelvo a empezar mi vida,
    ojalá vuelva a encontrarte otra vez. ❤️`;

    let i=0;

    let intervalo=setInterval(()=>{

    document.getElementById("cartaAmor").innerHTML+=texto[i];

    i++;

    if(i>=texto.length){

    clearInterval(intervalo);

    explosionAmor();

    mostrarFrase();

    setTimeout(()=>{

    document.getElementById("final").style.opacity="1";
    document.getElementById("final").style.pointerEvents="all";

    },12000);

    }

    },70);

    }

    /* FRASE */

    function mostrarFrase(){

    let frase=document.getElementById("fraseFinal");

    setTimeout(()=>{

    frase.style.opacity="1";

    document.querySelectorAll(".estrella").forEach(e=>{
    e.style.animationDuration="0.6s";
    });

    },2000);

    }

    /* PARTICULAS */

    function explosionAmor(){

    for(let i=0;i<120;i++){

    let p=document.createElement("div");

    p.className="particula";

    p.style.left=Math.random()*100+"vw";
    p.style.top=Math.random()*100+"vh";

    document.body.appendChild(p);

    setTimeout(()=>p.remove(),4000);

    }

    }

    /* CONTADOR */

    let inicio = new Date("2023-05-29T00:00:00");

    function actualizar(){

    let ahora = new Date();

    let diff = ahora - inicio;

    let años = Math.floor(diff / (1000*60*60*24*365));
    let meses = Math.floor((diff % (1000*60*60*24*365)) / (1000*60*60*24*30));
    let dias = Math.floor((diff % (1000*60*60*24*30)) / (1000*60*60*24));
    let horas = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

    document.getElementById("contador").innerHTML =
    `Llevamos juntos ❤️<br>
    <b>${años}</b> años •
    <b>${meses}</b> meses •
    <b>${dias}</b> días •
    <b>${horas}</b> horas`;

    }

    setInterval(actualizar,1000);
    actualizar();

    /* FOTOS */

    function mostrarFotos(){

    let fotos=document.querySelectorAll(".galeria img");

    fotos.forEach((foto,i)=>{

    setTimeout(()=>{
    foto.classList.add("visible");
    },800*i);

    });

    }

</script>

</body>
</html>
